version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - 27017:27017

  backend:
    build: ./backend
    ports:
      - 5000:5000
    environment:
      - MONGO_URI=mongodb://mongo:27017/complaintsdb
      - JWT_SECRET=supersecret
      - PORT=5000
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - 3000:80
    depends_on:
      - backend

volumes:
  mongo-data:
