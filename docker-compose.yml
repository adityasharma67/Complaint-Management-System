version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - 27017:27017

  backend:
    build: ./backend
    ports:
      - 5000:5000
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/complaintsdb
      - PORT=5000
    restart: unless-stopped
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - 3000:80
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
