name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: complaint-backend
  FRONTEND_IMAGE: complaint-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Backend setup and build
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          echo "📦 Installing backend dependencies..."
          npm ci
          echo "✅ Backend dependencies installed"

      - name: Backend Validation
        working-directory: ./backend
        run: |
          echo "✅ Backend validation passed (no tests defined)"

      # Frontend setup and build
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: |
          echo "📦 Installing frontend dependencies..."
          npm ci
          echo "✅ Frontend dependencies installed"

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          echo "🔨 Building frontend..."
          npm run build
          echo "✅ Frontend build completed"
          echo "📁 Build output:"
          ls -lah dist/ || echo "dist directory not found"

      - name: Check Frontend Build Artifacts
        working-directory: ./frontend
        run: |
          if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            echo "✅ Frontend build artifacts verified"
            find dist -type f | head -20
          else
            echo "❌ Frontend build failed - no artifacts generated"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        if: secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Test Docker Build - Backend
        run: |
          echo "🐳 Testing backend Docker build..."
          docker build -t test-backend:latest ./backend
          echo "✅ Backend Docker image built successfully"

      - name: Test Docker Build - Frontend
        run: |
          echo "🐳 Testing frontend Docker build..."
          docker build -t test-frontend:latest ./frontend
          echo "✅ Frontend Docker image built successfully"

      - name: Push Backend Image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
        run: |
          echo "🚀 Pushing backend image to Docker Hub..."
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest -t ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          echo "✅ Backend image pushed successfully"

      - name: Push Backend Image Notice
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (secrets.DOCKER_USERNAME == '' || secrets.DOCKER_PASSWORD == '')
        run: echo "⚠️  Skipping Docker Hub push - Docker credentials not configured in repository secrets"

      - name: Push Frontend Image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
        run: |
          echo "🚀 Pushing frontend image to Docker Hub..."
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest -t ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          echo "✅ Frontend image pushed successfully"

      - name: Push Frontend Image Notice
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (secrets.DOCKER_USERNAME == '' || secrets.DOCKER_PASSWORD == '')
        run: echo "⚠️  Skipping Docker Hub push - Docker credentials not configured in repository secrets"

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deployment-status:
    runs-on: ubuntu-latest
    needs: [ build, security-scan ]
    if: always()
    continue-on-error: true

    steps:
      - name: Deployment Status
        run: |
          echo "✅ CI/CD Pipeline Summary"
          echo "========================="
          echo "Build Status: ${{ needs.build.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "🎉 All checks passed! Ready for deployment."
          else
            echo "❌ Build failed. Please check the logs."
          fi
