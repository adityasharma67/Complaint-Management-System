<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Complaint Management</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Complaint Management System</h1>

      <nav>
        <button id="nav-login">Login</button>
        <button id="nav-signup">Signup</button>
        <button id="nav-submit">Submit Complaint</button>
        <button id="nav-view">My Complaints</button>
        <button id="nav-admin">Admin Dashboard</button>
        <button id="logout">Logout</button>
      </nav>

      <section id="login-section" class="page">
        <h2>Login</h2>
        <form id="login-form">
          <input name="email" placeholder="Email" />
          <input name="password" type="password" placeholder="Password" />
          <button type="submit">Login</button>
        </form>
      </section>

      <section id="signup-section" class="page hidden">
        <h2>Signup</h2>
        <form id="signup-form">
          <input name="name" placeholder="Name" />
          <input name="email" placeholder="Email" />
          <input name="password" type="password" placeholder="Password" />
          <button type="submit">Signup</button>
        </form>
      </section>

      <section id="submit-section" class="page hidden">
        <h2>Submit Complaint</h2>
        <form id="submit-form">
          <input name="title" placeholder="Title" />
          <textarea name="description" placeholder="Description"></textarea>
          <button type="submit">Submit</button>
        </form>
      </section>

      <section id="view-section" class="page hidden">
        <h2>My Complaints</h2>
        <div id="complaints-list"></div>
      </section>

      <section id="admin-section" class="page hidden">
        <h2>Admin Dashboard</h2>
        <div id="admin-list"></div>
      </section>
    </div>
    <script src="app.js"></script>
  </body>
</html>
